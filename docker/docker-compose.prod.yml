services:
  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ../uploads:/uploads:ro
    depends_on:
      - web
      - api
    networks:
      - blog-network
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    networks:
      - blog-network
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_EXPIRATION=${JWT_ACCESS_EXPIRATION:-3600000}
      - JWT_REFRESH_EXPIRATION=${JWT_REFRESH_EXPIRATION:-604800000}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - FILE_UPLOAD_DIR=/app/uploads
      - VAULT_AGENT_GRPC_HOST=agent
      - VAULT_AGENT_GRPC_PORT=9090
    volumes:
      - ../uploads:/app/uploads
    depends_on:
      - mongo
      - agent
    networks:
      - blog-network
    restart: unless-stopped

  agent:
    build:
      context: ..
      dockerfile: apps/agent/Dockerfile
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_CHAT_MODEL=${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      - OPENAI_WEB_SEARCH_MODEL=${OPENAI_WEB_SEARCH_MODEL:-gpt-4o-mini-search-preview}
      - MONGODB_URI=${MONGODB_URI}
      - MONGODB_DATABASE=${MONGODB_DATABASE:-kscold-blog}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-vault_notes}
      - VAULT_AGENT_GRPC_PORT=9090
      - VAULT_AGENT_MAX_CONTEXT_NOTES=${VAULT_AGENT_MAX_CONTEXT_NOTES:-5}
      - VAULT_AGENT_WEB_SEARCH_ENABLED=${VAULT_AGENT_WEB_SEARCH_ENABLED:-false}
    depends_on:
      - mongo
      - qdrant
    networks:
      - blog-network
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.10.1
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - blog-network
    restart: unless-stopped

  mongo:
    image: mongo:7.0
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=kscold-blog
    volumes:
      - mongo-data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    networks:
      - blog-network
    restart: unless-stopped

volumes:
  mongo-data:
    driver: local
  qdrant-data:
    driver: local

networks:
  blog-network:
    driver: bridge
