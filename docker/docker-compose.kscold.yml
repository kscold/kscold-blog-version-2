services:
  blog-mongo:
    container_name: kscold-blog-mongo
    image: mongo:7.0
    volumes:
      - blog-mongo-data:/data/db
    networks:
      - kscold-control_default
    restart: unless-stopped

  blog-web:
    container_name: kscold-blog-web
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://kscold.com/api
      - NEXT_PUBLIC_SOCKET_URL=https://kscold.com
    depends_on:
      - blog-api
    networks:
      - kscold-control_default
    restart: unless-stopped

  blog-api:
    container_name: kscold-blog-api
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - MONGODB_URI=mongodb://kscold-blog-mongo:27017/kscold-blog
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_EXPIRATION=3600000
      - JWT_REFRESH_EXPIRATION=604800000
      - CORS_ORIGINS=https://kscold.com
      - FILE_UPLOAD_DIR=/app/uploads
      - VAULT_AGENT_GRPC_HOST=blog-agent
      - VAULT_AGENT_GRPC_PORT=9090
    volumes:
      - blog-uploads:/app/uploads
    depends_on:
      - blog-mongo
      - blog-agent
    networks:
      - kscold-control_default
    restart: unless-stopped

  blog-agent:
    container_name: kscold-vault-agent
    build:
      context: ..
      dockerfile: apps/agent/Dockerfile
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_CHAT_MODEL=${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      - OPENAI_WEB_SEARCH_MODEL=${OPENAI_WEB_SEARCH_MODEL:-gpt-4o-mini-search-preview}
      - MONGODB_URI=mongodb://kscold-blog-mongo:27017/kscold-blog
      - MONGODB_DATABASE=kscold-blog
      - QDRANT_URL=http://blog-qdrant:6333
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-vault_notes}
      - VAULT_AGENT_GRPC_PORT=9090
      - VAULT_AGENT_MAX_CONTEXT_NOTES=${VAULT_AGENT_MAX_CONTEXT_NOTES:-5}
      - VAULT_AGENT_WEB_SEARCH_ENABLED=${VAULT_AGENT_WEB_SEARCH_ENABLED:-true}
      - VAULT_AGENT_INDEX_SYNC_INTERVAL_SECONDS=${VAULT_AGENT_INDEX_SYNC_INTERVAL_SECONDS:-900}
    depends_on:
      - blog-mongo
      - blog-qdrant
    networks:
      - kscold-control_default
    restart: unless-stopped

  blog-qdrant:
    container_name: kscold-vault-qdrant
    image: qdrant/qdrant:v1.10.1
    volumes:
      - blog-qdrant-data:/qdrant/storage
    networks:
      - kscold-control_default
    restart: unless-stopped

networks:
  kscold-control_default:
    external: true

volumes:
  blog-mongo-data:
    external: true
  blog-uploads:
    driver: local
  blog-qdrant-data:
    driver: local
