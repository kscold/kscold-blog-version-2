spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  application:
    name: kscold-blog-api

  data:
    mongodb:
      uri: ${MONGODB_URI:}
      auto-index-creation: true

  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: ${SMTP_AUTH:true}
      mail.smtp.starttls.enable: ${SMTP_STARTTLS:true}
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8081
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always

# JWT 설정
jwt:
  secret: ${JWT_SECRET:}
  refresh-secret: ${JWT_REFRESH_SECRET:${JWT_SECRET:}}
  access-token-expiration: 3600000 # 1 hour
  refresh-token-expiration: 604800000 # 7 days

# CORS 설정
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:3001}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: '*'
  allow-credentials: true

# File Upload (legacy - unused when MinIO is configured)
file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}

# MinIO S3 Object Storage
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:}
  secret-key: ${MINIO_SECRET_KEY:}
  bucket: ${MINIO_BUCKET:blog}
  public-url: ${MINIO_PUBLIC_URL:https://bucket.kscold.com}

# Team private docs
team:
  private:
    password: ${TEAM_PRIVATE_PASSWORD:}

# Discord Bot (채팅 브릿지)
discord:
  token: ${DISCORD_BOT_TOKEN:}
  guild-id: ${DISCORD_GUILD_ID:}
  channel-id: ${DISCORD_CHANNEL_ID:}

# Account recovery mail
account-recovery:
  public-url: ${APP_PUBLIC_URL:https://kscold.com}
  from-address: ${MAIL_FROM_ADDRESS:${SMTP_USERNAME:}}
  from-name: ${MAIL_FROM_NAME:KSCOLD}
  password-reset-expiry-minutes: ${PASSWORD_RESET_EXPIRY_MINUTES:30}

chat:
  reminder:
    enabled: ${CHAT_REMINDER_ENABLED:true}
    fixed-delay-ms: ${CHAT_REMINDER_FIXED_DELAY_MS:300000}
    unread-threshold-minutes: ${CHAT_REMINDER_THRESHOLD_MINUTES:30}

admin-night:
  admin-email: ${ADMIN_NIGHT_ADMIN_EMAIL:developerkscold@gmail.com}
  admin-name: ${ADMIN_NIGHT_ADMIN_NAME:김승찬}

# 디스코드 단방향 알림(회원가입·오류). 채널 ID 대신 채널 '이름'으로 찾고 없으면 봇이 생성함.
notification:
  discord:
    enabled: ${NOTIFICATION_DISCORD_ENABLED:true}
    auto-create-channel: ${NOTIFICATION_DISCORD_AUTO_CREATE:true}
    signup-channel-name: ${NOTIFICATION_DISCORD_SIGNUP_CHANNEL:회원가입}
    error-channel-name: ${NOTIFICATION_DISCORD_ERROR_CHANNEL:오류알림}
    guestbook-channel-name: ${NOTIFICATION_DISCORD_GUESTBOOK_CHANNEL:방명록}
    webhook-name: ${NOTIFICATION_DISCORD_WEBHOOK_NAME:kscold-blog-notifier}
    # 알림마다 표시될 봇 이름·아바타(채팅봇 이름으로 뜨지 않도록 역할별로 분리)
    signup-bot-name: ${NOTIFICATION_DISCORD_SIGNUP_BOT_NAME:회원가입 알림}
    signup-bot-avatar-url: ${NOTIFICATION_DISCORD_SIGNUP_BOT_AVATAR:}
    error-bot-name: ${NOTIFICATION_DISCORD_ERROR_BOT_NAME:오류 알림}
    error-bot-avatar-url: ${NOTIFICATION_DISCORD_ERROR_BOT_AVATAR:}
    guestbook-bot-name: ${NOTIFICATION_DISCORD_GUESTBOOK_BOT_NAME:방명록 알림}
    guestbook-bot-avatar-url: ${NOTIFICATION_DISCORD_GUESTBOOK_BOT_AVATAR:}

portone:
  store-id: ${PORTONE_STORE_ID:}
  kakao-pay-channel-key: ${PORTONE_KAKAOPAY_CHANNEL_KEY:}
  # KG이니시스 신용카드 채널키. 비우면 카드 결제 경로가 전체 비활성화됨(심사 종료 후 제거용)
  inicis-channel-key: ${PORTONE_INICIS_CHANNEL_KEY:}
  api-secret: ${PORTONE_API_SECRET:}
  api-base-url: ${PORTONE_API_BASE_URL:https://api.portone.io}

vault:
  agent:
    host: ${VAULT_AGENT_GRPC_HOST:localhost}
    port: ${VAULT_AGENT_GRPC_PORT:9090}
    deadline-millis: ${VAULT_AGENT_GRPC_DEADLINE_MS:60000}

# Logging
logging:
  level:
    com.kscold.blog: DEBUG
    org.springframework.data.mongodb: DEBUG
    org.springframework.security: DEBUG
