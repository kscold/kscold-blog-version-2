syntax = "proto3";

package kscold.vault.agent;

option java_multiple_files = true;
option java_package = "com.kscold.blog.vault.agent.grpc";
option java_outer_classname = "VaultAgentProto";

service VaultAgentService {
  rpc Chat(ChatRequest) returns (ChatResponse);
  rpc ChatStream(ChatRequest) returns (stream ChatStreamEvent);
  rpc Reindex(ReindexRequest) returns (ReindexResponse);
}

message ChatRequest {
  string message = 1;
  string active_folder_name = 2;
  ContentAccessScope content_access_scope = 3;
}

message ContentAccessScope {
  bool full_content_access = 1;
  repeated string allowed_post_ids = 2;
  repeated string allowed_category_ids = 3;
}

message ChatResponse {
  string answer = 1;
  repeated AgentStage stages = 2;
  repeated SourceNote sources = 3;
  repeated string follow_ups = 4;
}

message ChatStreamEvent {
  oneof event {
    AgentStage stage = 1;
    string delta = 2;
    ChatCompleted completed = 3;
  }
}

message ChatCompleted {
  string answer = 1;
  repeated SourceNote sources = 2;
  repeated string follow_ups = 3;
}

message AgentStage {
  string name = 1;
  string detail = 2;
}

message SourceNote {
  string id = 1;
  string title = 2;
  string slug = 3;
  double score = 4;
  string type = 5;
  string path = 6;
  string excerpt = 7;
}

message ReindexRequest {
  bool force = 1;
}

message ReindexResponse {
  int32 total_notes = 1;
  int32 indexed_notes = 2;
  int32 skipped_notes = 3;
}
