<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <g transform="translate(60 60)" fill="none" stroke="#0f172a" stroke-linecap="round" stroke-linejoin="round">

    <!-- Outer hex -->
    <polygon
      points="0,-42 36.4,-21 36.4,21 0,42 -36.4,21 -36.4,-21"
      stroke-width="3"
    />

    <!-- Snow tips — main spikes -->
    <line x1="0" y1="-42" x2="0" y2="-52" stroke-width="2.2"/>
    <line x1="36.4" y1="-21" x2="45" y2="-26" stroke-width="2.2"/>
    <line x1="36.4" y1="21" x2="45" y2="26" stroke-width="2.2"/>
    <line x1="0" y1="42" x2="0" y2="52" stroke-width="2.2"/>
    <line x1="-36.4" y1="21" x2="-45" y2="26" stroke-width="2.2"/>
    <line x1="-36.4" y1="-21" x2="-45" y2="-26" stroke-width="2.2"/>

    <!-- Snow branches — small forks at each tip -->
    <!-- Top -->
    <line x1="0" y1="-48" x2="-4" y2="-44" stroke-width="1.4" opacity="0.6"/>
    <line x1="0" y1="-48" x2="4" y2="-44" stroke-width="1.4" opacity="0.6"/>
    <!-- Top-right -->
    <line x1="42" y1="-24" x2="38" y2="-27.5" stroke-width="1.4" opacity="0.6"/>
    <line x1="42" y1="-24" x2="42.5" y2="-19" stroke-width="1.4" opacity="0.6"/>
    <!-- Bottom-right -->
    <line x1="42" y1="24" x2="42.5" y2="19" stroke-width="1.4" opacity="0.6"/>
    <line x1="42" y1="24" x2="38" y2="27.5" stroke-width="1.4" opacity="0.6"/>
    <!-- Bottom -->
    <line x1="0" y1="48" x2="-4" y2="44" stroke-width="1.4" opacity="0.6"/>
    <line x1="0" y1="48" x2="4" y2="44" stroke-width="1.4" opacity="0.6"/>
    <!-- Bottom-left -->
    <line x1="-42" y1="24" x2="-38" y2="27.5" stroke-width="1.4" opacity="0.6"/>
    <line x1="-42" y1="24" x2="-42.5" y2="19" stroke-width="1.4" opacity="0.6"/>
    <!-- Top-left -->
    <line x1="-42" y1="-24" x2="-42.5" y2="-19" stroke-width="1.4" opacity="0.6"/>
    <line x1="-42" y1="-24" x2="-38" y2="-27.5" stroke-width="1.4" opacity="0.6"/>

    <!-- Inner crystal lines (subtle structure) -->
    <line x1="0" y1="-42" x2="0" y2="-20" stroke-width="1" opacity="0.15"/>
    <line x1="0" y1="42" x2="0" y2="20" stroke-width="1" opacity="0.15"/>
    <line x1="-36.4" y1="-21" x2="-18" y2="-10" stroke-width="1" opacity="0.15"/>
    <line x1="36.4" y1="-21" x2="18" y2="-10" stroke-width="1" opacity="0.12"/>
    <line x1="-36.4" y1="21" x2="-18" y2="10" stroke-width="1" opacity="0.15"/>
    <line x1="36.4" y1="21" x2="18" y2="10" stroke-width="1" opacity="0.12"/>

    <!-- K letterform -->
    <!-- | stem -->
    <line x1="-16" y1="-18" x2="-16" y2="18" stroke-width="3.2"/>
    <!-- > upper arm to top-right vertex -->
    <line x1="4" y1="0" x2="36.4" y2="-21" stroke-width="5"/>
    <!-- > lower arm to bottom-right vertex -->
    <line x1="4" y1="0" x2="36.4" y2="21" stroke-width="5"/>

  </g>
</svg>
